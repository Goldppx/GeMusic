# CI 工作流：在 Linux 和 Windows 上构建并运行测试
# 所有注释使用中文（遵循仓库代理编码指南）
name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch: {}

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      # 为应对 Node.js 20 的弃用警告，强制 JavaScript actions 使用 Node.js 24
      # 这是一个短期兼容性方案；长期应升级各 action 到支持 Node.js 24 的版本
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        config: [Debug]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          # 安装基本构建工具和 libcurl 开发包，解决 curl/curl.h 丢失的问题
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libcurl4-openssl-dev

      - name: Setup vcpkg and install libcurl (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # 在 Windows 上使用 vcpkg 安装 libcurl 开发包，供 CMake 使用
          $vcpkgDir = "$env:RUNNER_TEMP\\vcpkg"
          git clone https://github.com/microsoft/vcpkg.git $vcpkgDir
          & "$vcpkgDir\\bootstrap-vcpkg.bat"
          & "$vcpkgDir\\vcpkg" install curl:x64-windows
          # 不再使用已弃用的 set-env 命令，改为写入环境文件以导出 VCPKG_ROOT
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$vcpkgDir"

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: |
          # 使用 out-of-source build 到 build/ 目录
          cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.config }}

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # 在 Windows 上通过 vcpkg toolchain 集成依赖
          $toolchain = "$env:VCPKG_ROOT\\scripts\\buildsystems\\vcpkg.cmake"
          cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.config }} -DCMAKE_TOOLCHAIN_FILE="$toolchain"

      - name: Build targets (Linux)
        if: runner.os == 'Linux'
        run: |
          # 在 Linux 上使用 -j 来并行构建
          cmake --build build --config ${{ matrix.config }} -- -j

      - name: Build targets (Windows)
        if: runner.os == 'Windows'
        run: |
          # 在 Windows (MSBuild) 上使用 /m 开启多核并行构建；不要传递 -j（MSBuild 不支持）
          cmake --build build --config ${{ matrix.config }} -- /m

      - name: Build tests target (Linux, if present)
        if: runner.os == 'Linux'
        run: |
          cmake --build build --config ${{ matrix.config }} --target tests -- -j || true

      - name: Build tests target (Windows, if present)
        if: runner.os == 'Windows'
        run: |
          cmake --build build --config ${{ matrix.config }} --target tests -- /m || exit 0

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: |
          ctest --test-dir build --output-on-failure

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: |
          # 在 Windows 上使用 -C 指定配置
          ctest --test-dir build -C ${{ matrix.config }} --output-on-failure

      - name: Upload GeMusic executable (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: GeMusic-linux
          path: build/GeMusic

      - name: Upload test executable (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: test_json_parser-linux
          path: build/tests/test_json_parser

      - name: Upload GeMusic executable (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: GeMusic-windows
          path: build/GeMusic.exe

      - name: Upload test executable (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: test_json_parser-windows
          path: build/tests/test_json_parser.exe
