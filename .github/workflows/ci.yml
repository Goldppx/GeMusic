# CI 工作流：在 Linux 和 Windows 上构建
name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch: {}

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            config: Debug
          - os: windows-latest
            arch: x86_64
            config: Debug
          - os: ubuntu-latest
            arch: arm64
            config: Debug

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies (Linux x86_64)
        if: runner.os == 'Linux' && matrix.arch == 'x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libcurl4-openssl-dev

      - name: Install build dependencies (Linux ARM64 Cross-Compile)
        if: runner.os == 'Linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libcurl4-openssl-dev

      - name: Setup vcpkg and install libcurl (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vcpkgDir = "$env:RUNNER_TEMP\\vcpkg"
          if (!(Test-Path $vcpkgDir)) {
            git clone https://github.com/microsoft/vcpkg.git $vcpkgDir
          }
          & "$vcpkgDir\\bootstrap-vcpkg.bat"
          & "$vcpkgDir\\vcpkg" install curl:x64-windows
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$vcpkgDir"

      - name: Configure CMake (Linux x86_64)
        if: runner.os == 'Linux' && matrix.arch == 'x86_64'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.config }}

      - name: Configure CMake (Linux ARM64)
        if: runner.os == 'Linux' && matrix.arch == 'arm64'
        run: |
          # 指定交叉编译器
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $toolchain = "$env:VCPKG_ROOT\\scripts\\buildsystems\\vcpkg.cmake"
          cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.config }} -DCMAKE_TOOLCHAIN_FILE="$toolchain"

      - name: Build targets (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake --build build --config ${{ matrix.config }} -- -j

      - name: Build targets (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake --build build --config ${{ matrix.config }} -- /m

      - name: Build tests target (Linux, if present)
        if: runner.os == 'Linux'
        run: |
          cmake --build build --config ${{ matrix.config }} --target tests -- -j || true

      - name: Build tests target (Windows, if present)
        if: runner.os == 'Windows'
        run: |
          cmake --build build --config ${{ matrix.config }} --target tests -- /m || exit 0

      - name: Run tests (Linux x86_64 Only)
        if: runner.os == 'Linux' && matrix.arch == 'x86_64'
        run: |
          ctest --test-dir build --output-on-failure

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: |
          ctest --test-dir build -C ${{ matrix.config }} --output-on-failure

      - name: Upload GeMusic executable (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: GeMusic-linux-${{ matrix.arch }}
          path: build/GeMusic

      - name: Upload GeMusic executable (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: GeMusic-windows
          path: build/GeMusic.exe
