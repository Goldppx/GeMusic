# CI 工作流：在 Linux 和 Windows 上构建并运行测试
# 所有注释使用中文（遵循仓库代理编码指南）
name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch: {}

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        config: [Debug]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          # 安装基本构建工具。项目的第三方依赖通过 FetchContent 管理，通常不需要额外包。
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Configure CMake
        run: |
          # 使用 out-of-source build 到 build/ 目录
          cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.config }}

      - name: Build targets (Linux)
        if: runner.os == 'Linux'
        run: |
          # 在 Linux 上使用 -j 来并行构建
          cmake --build build --config ${{ matrix.config }} -- -j

      - name: Build targets (Windows)
        if: runner.os == 'Windows'
        run: |
          # 在 Windows (MSBuild) 上使用 /m 开启多核并行构建；不要传递 -j（MSBuild 不支持）
          cmake --build build --config ${{ matrix.config }} -- /m

      - name: Build tests target (Linux, if present)
        if: runner.os == 'Linux'
        run: |
          cmake --build build --config ${{ matrix.config }} --target tests -- -j || true

      - name: Build tests target (Windows, if present)
        if: runner.os == 'Windows'
        run: |
          cmake --build build --config ${{ matrix.config }} --target tests -- /m || exit 0

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: |
          ctest --test-dir build --output-on-failure

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: |
          # 在 Windows 上使用 -C 指定配置
          ctest --test-dir build -C ${{ matrix.config }} --output-on-failure
